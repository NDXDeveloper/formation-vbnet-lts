// localement pour le JSON transcoding gRPC, comme l'indique la documentation
// Microsoft. Déclare l'extension google.api.http utilisée dans catalogue.proto.
syntax = "proto3";

package google.api;

import "google/api/http.proto";
import "google/protobuf/descriptor.proto";

option go_package = "google.golang.org/genproto/googleapis/api/annotations;annotations";
option java_multiple_files = true;
option java_outer_classname = "AnnotationsProto";
option java_package = "com.google.api";
option objc_class_prefix = "GAPI";

extend google.protobuf.MethodOptions {
  // Numéro d'extension réservé par Google pour la règle HTTP.
  HttpRule http = 72295728;
}
