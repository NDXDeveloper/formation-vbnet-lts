// ============================================================================
//  Section 8.5 : gRPC et GraphQL — contrat .proto (côté client)
//  Description : Le contrat « contract-first » de gRPC. Décrit le service et
//                ses messages ; Grpc.Tools en génère le STUB client C#
//                (CatalogueServiceClient) et les classes de messages.
//                Version SANS annotations HTTP : pur gRPC, consommé par VB via
//                la bibliothèque C# générée.
//  Fichier source : 05-grpc-graphql.md
// ============================================================================
syntax = "proto3";

option csharp_namespace = "Catalogue.Grpc";
package catalogue;

service CatalogueService {
  rpc ObtenirProduit (ProduitRequete) returns (ProduitReponse);
}

message ProduitRequete {
  int32 id = 1;
}

message ProduitReponse {
  int32 id = 1;
  string nom = 2;
  double prix = 3;
}
